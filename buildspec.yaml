version: 0.2
phases:
  pre_build:
    commands:
      - echo Entered prebuild phase
      - pwd
      - ls -la
  build:
    commands:
      - echo Build started on $(date)
      - mvn clean package -DskipTests
      - ls -la target
      - find . -name "*.jar" -print
  post_build:
    commands:
      - echo Build completed on $(date)
artifacts:
  files:
    - target/cloud-store-0.0.1-SNAPSHOT.jar
  discard-paths: 'yes'