spring.application.name=cloud-store

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/cloudstore}
spring.datasource.username=${DB_USERNAME:user}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

jwt.private-key=${JWT_PRIVATE_KEY}
jwt.public-key=${JWT_PUBLIC_KEY}
jwt.issuer=${JWT_ISSUER:http://localhost:5000}
jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
server.port=${PORT:5000}
