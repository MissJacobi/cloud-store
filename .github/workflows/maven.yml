# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

name: Java CI with Maven and Docker

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    # HÄR STARTAR VI EN TILLFÄLLIG DATABAS PÅ GITHUB FÖR DINA REPOSITORY-TESTER
    services:
      db:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: cloudstore
          MYSQL_USER: user
          MYSQL_PASSWORD: password
          MYSQL_ROOT_PASSWORD: password
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    # 1. Hämtar din källkod från GitHub
    - uses: actions/checkout@v4

    # 2. Startar Java 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # 3. Bygger .jar-fil och kör ALLA dina automatiska tester på riktigt!
    - name: Build with Maven and Run Tests
      run: mvn clean package

    # 4. Loggar in på din Docker Hub-användare automatiskt
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 5. Bygger din Dockerfile och skickar (pushar) den till Docker Hub
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/cloudstore-backend:latest
